# Local Development Database
# Run: docker-compose up -d
# Stop: docker-compose down
# Reset: docker-compose down -v (removes all data)

version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: tarot-db-local
    environment:
      POSTGRES_USER: tarot
      POSTGRES_PASSWORD: tarot123
      POSTGRES_DB: tarot_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Optional: Initialize with seed data
      # - ./backend/scripts/init-db.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tarot -d tarot_dev"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - tarot-network

  # Optional: PGAdmin for database GUI
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: tarot-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@tarot.local
      PGADMIN_DEFAULT_PASSWORD: admin123
      PGADMIN_CONFIG_SERVER_MODE: 'False'
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - tarot-network
    profiles:
      - gui  # Only start with: docker-compose --profile gui up -d

volumes:
  postgres_data:
    name: tarot_postgres_data

networks:
  tarot-network:
    name: tarot_network
