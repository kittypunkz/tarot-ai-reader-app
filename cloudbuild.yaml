# Google Cloud Build configuration
# Use this if you choose Google Cloud over Render

steps:
  # Step 1: Run backend tests
  - name: 'python:3.12-slim'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        cd backend
        pip install -r requirements.txt
        pip install pytest
        PYTHONPATH=. pytest tests/ -v || true

  # Step 2: Build Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/tarot-backend:$COMMIT_SHA'
      - '-f'
      - 'backend/Dockerfile'
      - './backend'

  # Step 3: Push to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/tarot-backend:$COMMIT_SHA'

  # Step 4: Run database migrations
  - name: 'gcr.io/cloud-builders/gcloud'
    entrypoint: bash
    args:
      - '-c'
      - |
        cd backend
        pip install -r requirements.txt
        export DATABASE_URL=$(gcloud secrets versions access latest --secret=database-url)
        alembic upgrade head

  # Step 5: Deploy to Cloud Run
  - name: 'gcr.io/cloud-builders/gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'tarot-backend'
      - '--image=gcr.io/$PROJECT_ID/tarot-backend:$COMMIT_SHA'
      - '--region=asia-southeast1'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--set-secrets=DATABASE_URL=database-url:latest,OPENROUTER_API_KEY=openrouter-api-key:latest'
      - '--memory=512Mi'
      - '--cpu=1'
      - '--concurrency=80'
      - '--max-instances=10'

images:
  - 'gcr.io/$PROJECT_ID/tarot-backend:$COMMIT_SHA'

options:
  logging: CLOUD_LOGGING_ONLY
